spring:
  kafka:
    consumer:  
      bootstrap-servers: localhost:9092
      group-id: myGroup #consumer group id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
     # Deserialize as string when consumer pulls message
     # value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
          spring.json.trusted.packages:  '*'   #'com.dev.anh.kafka.payload' # If the serialization is only done by a trusted source, you can also enable trust all (*).     

    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
     # Serialize as string when producer pushes message
     #value-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer    